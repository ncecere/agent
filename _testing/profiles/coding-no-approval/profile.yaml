apiVersion: agent/v1
kind: Profile
metadata:
  name: coding-no-approval
  version: 0.1.0
  description: Coding profile that explicitly allows shell without approval via policy override
spec:
  instructions:
    system:
      - ./prompts/system.md
  provider:
    default: openai
    model: nemotron-3-super-120b-a12b
  tools:
    enabled:
      - core/glob
      - core/grep
      - core/read
      - core/write
      - core/edit
      - core/bash
  approval:
    mode: never
    requireFor: []
  workspace:
    required: true
    writeScope: workspace
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays:
      - ./policy/default.yaml
